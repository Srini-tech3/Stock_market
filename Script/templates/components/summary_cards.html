<div class="summary-cards">

    <!-- Total Strategies -->
    <div class="summary-card">
        <div class="card-info">
            <h4 class="card-title">Strategies Found</h4>
            <h2 class="card-value">
                {{ summary.total_strategies }}
            </h2>
        </div>
        <div class="card-icon blue">
            <i class="bi bi-list-check"></i>
        </div>
    </div>

    <!-- Top Strategy -->
    <div class="summary-card">
        <div class="card-info">
            <h4 class="card-title">Top Strategy</h4>
            <h2 class="card-value strategy-name">
                {{ summary.top_strategy }}
            </h2>
        </div>
        <div class="card-icon green">
            <i class="bi bi-trophy-fill"></i>
        </div>
    </div>

    <!-- Highest POP -->
    <div class="summary-card">
        <div class="card-info">
            <h4 class="card-title">Highest POP</h4>
            <h2 class="card-value">
                {{ summary.highest_pop }}%
            </h2>
        </div>
        <div class="card-icon orange">
            <i class="bi bi-bullseye"></i>
        </div>
    </div>

    <!-- Best Return on Risk -->
    <div class="summary-card">
        <div class="card-info">
            <h4 class="card-title">Best Return on Risk</h4>
            <h2 class="card-value">
                {{ summary.best_ror }}%
            </h2>
        </div>
        <div class="card-icon purple">
            <i class="bi bi-graph-up-arrow"></i>
        </div>
    </div>

</div>
